version: '3.8'

services:

  oracle:
    image: gvenzl/oracle-free:slim-faststart
    container_name: challenge-db
    ports:
      - "1521:1521"
    environment:
      APP_USER: challenge
      APP_USER_PASSWORD: challenge
      ORACLE_PASSWORD: admin
      ORACLE_MEMORY: 1024
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  kafka:
    image: redpandadata/redpanda:latest
    container_name: challenge-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy|true' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: challenge-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  api:
    build: .
    container_name: challenge-api
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local

      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: challenge
      SPRING_DATASOURCE_PASSWORD: challenge

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  oracle_data:
