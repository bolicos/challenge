services:

  postgres:
    image: postgres:15-alpine
    container_name: challenge-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: challenge
      POSTGRES_USER: challenge
      POSTGRES_PASSWORD: challenge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U challenge -d challenge" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: redpandadata/redpanda:latest
    container_name: challenge-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy|true' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: challenge-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-topic-setup:
    image: redpandadata/redpanda:latest
    container_name: challenge-kafka-topic-setup
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - -X
      - brokers=kafka:9092
      - topic
      - create
      - communication-preference-events
      - --partitions
      - "3"
      - --replicas
      - "1"
      - --if-not-exists

  api:
    image: challenge-api:${APP_VERSION:-local}
    build:
      context: .
    container_name: challenge-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-topic-setup:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prd

      APP_NAME: app-prd
      SERVER_PORT: 8080

      MANAGEMENT_HEALTH_SHOW_DETAILS: always
      MANAGEMENT_ENDPOINTS_EXPOSURE: health,info,metrics,prometheus
      JACKSON_WRITE_DATES_AS_TIMESTAMPS: false

      DB_URL: jdbc:postgresql://postgres:5432/challenge
      DB_USERNAME: challenge
      DB_PASSWORD: challenge
      DB_DRIVER: org.postgresql.Driver

      JPA_SHOW_SQL: true
      JPA_OPEN_IN_VIEW: false
      JPA_DDL_AUTO: validate
      JPA_FORMAT_SQL: true
      JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect

      FLYWAY_ENABLED: true
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_LOCATIONS: classpath:db/migration
      FLYWAY_BASELINE_DESCRIPTION: baseline prd schema before Flyway

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      KAFKA_PRODUCER_VALUE_SERIALIZER: org.springframework.kafka.support.serializer.JsonSerializer
      KAFKA_PRODUCER_ACKS: all
      KAFKA_PRODUCER_RETRIES: 10
      KAFKA_PRODUCER_LINGER_MS: 10
      KAFKA_PRODUCER_BATCH_SIZE: 32768
      KAFKA_PRODUCER_COMPRESSION_TYPE: lz4
      KAFKA_PRODUCER_ENABLE_IDEMPOTENCE: true
      KAFKA_PRODUCER_REQUEST_TIMEOUT_MS: 30000
      KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS: 120000
      KAFKA_PRODUCER_ADD_TYPE_HEADERS: false
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS: 5

      KAFKA_LISTENER_ACK_MODE: manual
      KAFKA_CONSUMER_KEY_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
      KAFKA_CONSUMER_VALUE_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
      KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      KAFKA_CONSUMER_ENABLE_AUTO_COMMIT: false

      BATCH_JOB_ENABLED: false
      BATCH_JDBC_INITIALIZE_SCHEMA: always

      PREFERENCE_EVENTS_TOPIC: communication-preference-events
      PREFERENCE_EVENT_LOGGER_ENABLED: true
      PREFERENCE_EVENT_LOGGER_GROUP_ID: challenge-preference-event-logger

    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
