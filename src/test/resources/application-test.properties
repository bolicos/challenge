spring.application.name=challenge-test

# Database Connection
spring.datasource.url=jdbc:h2:mem:challenge-test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Database
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false

# Flyway and Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka Servers
spring.kafka.bootstrap-servers=localhost:9092

# Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Kafka Topics and Consumers configuration custom properties
challenge.kafka.consumers.preference-event-logger.enabled=false
