spring.application.name=${APP_NAME:challenge-prd}
server.port=${SERVER_PORT:8080}

# Actuator
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,metrics,prometheus}

# Serialization
spring.jackson.serialization.write-dates-as-timestamps=${JACKSON_WRITE_DATES_AS_TIMESTAMPS:false}
spring.jackson.time-zone=${JACKSON_TIME_ZONE:UTC}

# Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# Database
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.time_zone=${JPA_JDBC_TIME_ZONE:UTC}

# Flyway and Migration
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-description=${FLYWAY_BASELINE_DESCRIPTION:baseline PRD schema before Flyway}

# Kafka Servers
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Kafka Producer
spring.kafka.producer.acks=${KAFKA_PRODUCER_ACKS:all}
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:10}
spring.kafka.producer.properties.linger.ms=${KAFKA_PRODUCER_LINGER_MS:10}
spring.kafka.producer.properties.batch.size=${KAFKA_PRODUCER_BATCH_SIZE:32768}
spring.kafka.producer.properties.compression.type=${KAFKA_PRODUCER_COMPRESSION_TYPE:lz4}
spring.kafka.producer.properties.enable.idempotence=${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:true}
spring.kafka.producer.properties.request.timeout.ms=${KAFKA_PRODUCER_REQUEST_TIMEOUT_MS:30000}
spring.kafka.producer.properties.delivery.timeout.ms=${KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:120000}
spring.kafka.producer.properties.spring.json.add.type.headers=${KAFKA_PRODUCER_ADD_TYPE_HEADERS:false}
spring.kafka.producer.properties.max.in.flight.requests.per.connection=${KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS:5}
spring.kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER:org.springframework.kafka.support.serializer.JsonSerializer}

# Kafka Consumer
spring.kafka.listener.ack-mode=${KAFKA_LISTENER_ACK_MODE:manual}
spring.kafka.consumer.enable-auto-commit=${KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:false}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}

# Batch
spring.batch.job.enabled=${BATCH_JOB_ENABLED:false}
spring.batch.jdbc.initialize-schema=${BATCH_JDBC_INITIALIZE_SCHEMA:always}

# Kafka Topics and Consumers configuration custom properties
challenge.kafka.topics.preference-events=${PREFERENCE_EVENTS_TOPIC:communication-preference-events}
challenge.kafka.consumers.preference-event-logger.enabled=${PREFERENCE_EVENT_LOGGER_ENABLED:false}
challenge.kafka.consumers.preference-event-logger.group-id=${PREFERENCE_EVENT_LOGGER_GROUP_ID:challenge-preference-event-logger}
